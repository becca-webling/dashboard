<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스냅스 결제 퍼널 데이터 인사이트</title>
  
  <!-- Pretendard 폰트 로드 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background-color: #f8fafc;
    }
    * {
      box-sizing: border-box;
    }
    button {
      font-family: inherit;
    }
  </style>

  <!-- React & ReactDOM (CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Recharts 의존성 및 Recharts (CDN) -->
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
  
  <!-- Babel Standalone (브라우저에서 JSX 트랜스파일용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // React Hook 가져오기
    const { useState } = React;
    
    // Recharts 컴포넌트 가져오기
    const { 
      BarChart, Bar, LineChart, Line, AreaChart, Area, PieChart, Pie, Cell, 
      XAxis, YAxis, Tooltip, ResponsiveContainer, Legend, CartesianGrid 
    } = window.Recharts;

    const SECTIONS = [
      { id:"overview",    label:"📋 개요",                  group:"개요" },
      { id:"funnel",      label:"1. 단계별 전환율",          group:"분석" },
      { id:"abandon",     label:"2. 결제시도 이탈(146002)",   group:"분석" },
      { id:"recovery",    label:"3. 이탈 유저 추적",          group:"분석" },
      { id:"category",    label:"4. 카테고리별",              group:"분석" },
      { id:"price",       label:"5. 객단가별",                group:"분석" },
      { id:"purchase",    label:"6. 첫구매 vs 재구매",        group:"분석" },
      { id:"payment",     label:"7. 결제수단",                group:"분석" },
      { id:"coupon",      label:"8. 쿠폰·할인",               group:"분석" },
      { id:"hourly",      label:"9. 결제 시간대",             group:"분석" },
      { id:"channelmix",  label:"10. 프로젝트 채널 구성",     group:"분석" },
      { id:"limits",      label:"⚠️ 한계 및 검증 필요",       group:"부록" },
      { id:"mapping",     label:"🎯 데이터 → 정책 매핑",      group:"부록" },
    ];

    function App() {
      const [section, setSection] = useState("overview");
      const groups = [...new Set(SECTIONS.map(s => s.group))];

      return (
        <div style={{ display:"flex", minHeight:"100vh", background:"#f8fafc", color:"#1e293b" }}>
          {/* Sidebar */}
          <aside style={{ width:240, background:"#fff", borderRight:"1px solid #e2e8f0", padding:20, position:"sticky", top:0, height:"100vh", overflowY:"auto" }}>
            <div style={{ fontSize:13, fontWeight:800, marginBottom:4, color:"#1e293b" }}>스냅스 결제 퍼널</div>
            <div style={{ fontSize:11, color:"#64748b", marginBottom:20 }}>데이터 인사이트 v1.0</div>
            {groups.map(g => (
              <div key={g} style={{ marginBottom:14 }}>
                <div style={{ fontSize:10, fontWeight:700, color:"#94a3b8", marginBottom:6, textTransform:"uppercase", letterSpacing:0.5 }}>{g}</div>
                {SECTIONS.filter(s => s.group === g).map(s => (
                  <button key={s.id} onClick={()=>setSection(s.id)} style={{
                    display:"block", width:"100%", textAlign:"left", padding:"7px 10px",
                    borderRadius:6, border:"none", marginBottom:2, cursor:"pointer",
                    fontSize:12, fontWeight: section===s.id ? 700 : 400,
                    background: section===s.id ? "#1e293b" : "transparent",
                    color: section===s.id ? "#fff" : "#475569",
                    transition:"all 0.1s"
                  }}>{s.label}</button>
                ))}
              </div>
            ))}
          </aside>

          {/* Main */}
          <main style={{ flex:1, padding:32, maxWidth:1100 }}>
            {section === "overview"   && <Overview />}
            {section === "funnel"     && <Funnel />}
            {section === "abandon"    && <Abandon />}
            {section === "recovery"   && <Recovery />}
            {section === "category"   && <Category />}
            {section === "price"      && <Price />}
            {section === "purchase"   && <Purchase />}
            {section === "payment"    && <Payment />}
            {section === "coupon"     && <Coupon />}
            {section === "hourly"     && <Hourly />}
            {section === "channelmix" && <ChannelMix />}
            {section === "limits"     && <Limits />}
            {section === "mapping"    && <Mapping />}
          </main>
        </div>
      );
    }

    // ─── 공통 컴포넌트 ───
    const Card = ({ title, children, color="#fff", border="#e2e8f0" }) => (
      <div style={{ background:color, borderRadius:10, padding:16, border:`1px solid ${border}`, marginBottom:14 }}>
        {title && <div style={{ fontSize:14, fontWeight:700, marginBottom:10 }}>{title}</div>}
        {children}
      </div>
    );

    const Insight = ({ children, color="#fef3c7", border="#fbbf24", text="#92400e" }) => (
      <div style={{ background:color, borderRadius:10, padding:14, border:`1px solid ${border}`, marginBottom:14 }}>
        <div style={{ fontSize:12, fontWeight:700, color:text, marginBottom:6 }}>💡 인사이트</div>
        <div style={{ fontSize:12, color:text, lineHeight:1.8 }}>{children}</div>
      </div>
    );

    const Policy = ({ children }) => (
      <div style={{ background:"#f0fdf4", borderRadius:10, padding:14, border:"1px solid #86efac", marginBottom:14 }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#166534", marginBottom:6 }}>🎯 연결되는 정책</div>
        <div style={{ fontSize:12, color:"#15803d", lineHeight:1.8 }}>{children}</div>
      </div>
    );

    const Purpose = ({ children }) => (
      <div style={{ background:"#eff6ff", borderRadius:10, padding:14, border:"1px solid #93c5fd", marginBottom:14 }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#1e40af", marginBottom:6 }}>🔍 분석 목적</div>
        <div style={{ fontSize:12, color:"#1e3a5f", lineHeight:1.8 }}>{children}</div>
      </div>
    );

    const H1 = ({ children, sub }) => (
      <div style={{ marginBottom:24 }}>
        <h1 style={{ fontSize:22, fontWeight:800, margin:0, marginBottom:4 }}>{children}</h1>
        {sub && <div style={{ fontSize:13, color:"#64748b" }}>{sub}</div>}
      </div>
    );

    const th = { padding:"10px 8px", textAlign:"center", fontWeight:600, fontSize:12, borderBottom:"1px solid #e2e8f0", whiteSpace:"nowrap", background:"#f8fafc" };
    const td = { padding:"8px", textAlign:"center", borderBottom:"1px solid #f1f5f9", fontSize:12, whiteSpace:"nowrap" };

    // ═══════════════════════════════════════════════
    // 1. 개요
    // ═══════════════════════════════════════════════
    const Overview = () => (
      <React.Fragment>
        <H1 sub="스냅스 KR · 2026년 4~5월 · BigQuery 기반">스냅스 결제 퍼널 데이터 인사이트</H1>

        <Card title="분석 개요">
          <table style={{ width:"100%", fontSize:13, borderCollapse:"collapse" }}>
            <tbody>
              <tr><td style={{...td,textAlign:"left",width:140,fontWeight:600}}>데이터 소스</td><td style={{...td,textAlign:"left"}}>BigQuery (snaps_carts, snaps_orders, snaps_product_groups, GA4)</td></tr>
              <tr><td style={{...td,textAlign:"left",fontWeight:600}}>분석 기간</td><td style={{...td,textAlign:"left"}}>2026-04-01 ~ 2026-05-31 (스냅스 KR 한정)</td></tr>
              <tr><td style={{...td,textAlign:"left",fontWeight:600}}>채널 구분</td><td style={{...td,textAlign:"left"}}>PC (KOR0000) / 모바일 (KOR0031)</td></tr>
              <tr><td style={{...td,textAlign:"left",fontWeight:600}}>cart_status</td><td style={{...td,textAlign:"left"}}>146001 (장바구니) / 146002 (결제시도 이탈) / 146003 (주문완료)</td></tr>
              <tr><td style={{...td,textAlign:"left",fontWeight:600}}>제외 처리</td><td style={{...td,textAlign:"left"}}>bot 계정 user_no=37751189 / cart_deleted_yn='Y' / project_deleted_yn='Y'</td></tr>
            </tbody>
          </table>
        </Card>

        <Card title="핵심 지표 요약 (한눈에)">
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:12 }}>
            {[
              { k:"모바일 총 전환율", v:"58.5%", c:"#f97316" },
              { k:"PC 총 전환율", v:"57.0%", c:"#3b82f6" },
              { k:"모바일 결제시도 이탈", v:"20,674건", c:"#dc2626", sub:"11,503명, 2개월" },
              { k:"모바일 간편결제 비중", v:"66.5%", c:"#10b981", sub:"네페+토스+카페" },
              { k:"쿠폰 사용 주문 비율", v:"59%", c:"#8b5cf6" },
              { k:"당일 결제 비중", v:"73%", c:"#0ea5e9", sub:"20-23시 35% 집중" },
            ].map((kpi,i)=>(
              <div key={i} style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:8, padding:14 }}>
                <div style={{ fontSize:11, color:"#64748b", marginBottom:4 }}>{kpi.k}</div>
                <div style={{ fontSize:24, fontWeight:800, color:kpi.c }}>{kpi.v}</div>
                {kpi.sub && <div style={{ fontSize:10, color:"#94a3b8", marginTop:2 }}>{kpi.sub}</div>}
              </div>
            ))}
          </div>
        </Card>

        <Card title="3대 핵심 문제 진단" color="#fff7ed" border="#fdba74">
          <div style={{ fontSize:13, color:"#9a3412", lineHeight:1.8 }}>
            <div style={{ marginBottom:8 }}><b>1. 모바일 주문서 결제 마찰</b> — 결제시도 이탈 20,674건. PG 오류가 아닌 UI 마찰</div>
            <div style={{ marginBottom:8 }}><b>2. 할인 정보 가시성 약함</b> — 쿠폰 사용 59%인데 장바구니·주문서에서 잘 안 보임</div>
            <div><b>3. 즉흥구매·모바일 재구매 마찰 집중</b> — 굿즈 18.2% / 폰케이스 21.9% 이탈, 모바일 재구매 카테고리 믹스 효과로 GAP 7.9%p</div>
          </div>
        </Card>
      </React.Fragment>
    );

    // ═══════════════════════════════════════════════
    // 1. 단계별 전환율
    // ═══════════════════════════════════════════════
    const Funnel = () => {
      const data = [
        { stage:"장바구니→주문서", "모바일":75.6, "PC":70.5 },
        { stage:"주문서→구매완료", "모바일":76.4, "PC":80.9 },
        { stage:"총 전환율", "모바일":58.5, "PC":57.0 },
      ];

      return (
        <React.Fragment>
          <H1 sub="장바구니→주문서→구매완료 3단계 전환율을 디바이스·월별로 측정">1. 단계별 전환율</H1>

          <Purpose>장바구니→주문서→구매완료 각 단계의 전환율을 디바이스별로 분리해 누수가 발생하는 단계를 특정.</Purpose>

          <Card title="디바이스별 전환율 (4~5월 합산, 장바구니 경유 기준)">
            <ResponsiveContainer width="100%" height={280}>
              <BarChart data={data}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                <XAxis dataKey="stage" tick={{ fontSize:12 }}/>
                <YAxis tick={{ fontSize:11 }} domain={[0,100]} unit="%"/>
                <Tooltip formatter={(v)=>`${v}%`} contentStyle={{ fontSize:12 }}/>
                <Legend wrapperStyle={{ fontSize:12 }}/>
                <Bar dataKey="PC" fill="#3b82f6" radius={[3,3,0,0]}/>
                <Bar dataKey="모바일" fill="#f97316" radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </Card>

          <Card title="월별 추이 (모바일)">
            <ResponsiveContainer width="100%" height={220}>
              <LineChart data={[
                { month:"4월", "장바구니→주문서":77.6, "주문서→구매완료":76.5 },
                { month:"5월", "장바구니→주문서":73.1, "주문서→구매완료":78.6 },
              ]}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                <XAxis dataKey="month" tick={{ fontSize:12 }}/>
                <YAxis tick={{ fontSize:11 }} domain={[60,90]} unit="%"/>
                <Tooltip formatter={(v)=>`${v}%`} contentStyle={{ fontSize:12 }}/>
                <Legend wrapperStyle={{ fontSize:11 }}/>
                <Line type="monotone" dataKey="장바구니→주문서" stroke="#f97316" strokeWidth={2.5} dot={{ r:5 }}/>
                <Line type="monotone" dataKey="주문서→구매완료" stroke="#dc2626" strokeWidth={2.5} dot={{ r:5 }}/>
              </LineChart>
            </ResponsiveContainer>
          </Card>

          <Insight>
            <b>모바일 장바구니→주문서가 4→5월 4.5%p 하락</b> (77.6%→73.1%). 모바일은 두 단계 모두에서 누수 발생, PC는 첫 단계 손실이 큼.<br/>
            총 전환율은 비슷하지만, <b>모바일 트래픽이 PC의 2배</b>라 절대 손실 규모는 모바일이 훨씬 큼.
          </Insight>

          <Policy>해결 방향 B (모바일 결제 마찰 축소) 전체 — P1-1, P1-2, P1-3, P1-4</Policy>
        </React.Fragment>
      );
    };

    // ═══════════════════════════════════════════════
    // 2. 결제시도 이탈 (146002)
    // ═══════════════════════════════════════════════
    const Abandon = () => (
      <React.Fragment>
        <H1 sub="cart_status=146002 — 주문서 페이지 진입 후 결제 시도 전 이탈">2. 결제시도 이탈의 정체</H1>

        <Purpose>주문서 페이지까지 진입했지만 결제를 완료하지 못한 프로젝트가 어떤 상태인지 파악. 결제 실패(PG 오류) vs 결제 시도 전 이탈을 구분.</Purpose>

        <Card title="146002 프로젝트의 snaps_orders 매칭 결과 (모바일)">
          <div style={{ display:"flex", gap:14, flexWrap:"wrap" }}>
            <div style={{ flex:1, minWidth:200, padding:14, background:"#fef2f2", borderRadius:8, border:"1px solid #fca5a5", textAlign:"center" }}>
              <div style={{ fontSize:30, fontWeight:800, color:"#dc2626" }}>20,764건</div>
              <div style={{ fontSize:12, color:"#991b1b" }}>결제시도 이탈 프로젝트</div>
            </div>
            <div style={{ flex:1, minWidth:200, padding:14, background:"#fff7ed", borderRadius:8, border:"1px solid #fdba74", textAlign:"center" }}>
              <div style={{ fontSize:30, fontWeight:800, color:"#c2410c" }}>0건</div>
              <div style={{ fontSize:12, color:"#9a3412" }}>snaps_orders 매칭 레코드</div>
            </div>
            <div style={{ flex:1, minWidth:200, padding:14, background:"#f0fdf4", borderRadius:8, border:"1px solid #86efac", textAlign:"center" }}>
              <div style={{ fontSize:30, fontWeight:800, color:"#16a34a" }}>100%</div>
              <div style={{ fontSize:12, color:"#166534" }}>주문 시도조차 안 함</div>
            </div>
          </div>
        </Card>

        <Insight>
          <b>146002 = "결제 실패"가 아니라 "결제 버튼을 한 번도 누르지 않은 이탈"</b>이다.<br/>
          orders 테이블에 단 한 건의 매칭 레코드도 없음 → 결제수단 선택·결제 버튼 클릭 전에 빠짐.<br/>
          PG 오류·결제 거절이 아닌 <b>주문서 UI 자체의 마찰</b>이 이탈 원인이라는 결정적 증거.
        </Insight>

        <Card title="이탈 시나리오 추정" color="#fff" border="#cbd5e1">
          <div style={{ fontSize:13, color:"#475569", lineHeight:1.9 }}>
            1️⃣ 주문서 진입 → 배송지·주문자 정보·결제수단 등 입력 항목 나열 노출<br/>
            2️⃣ 결제수단까지 스크롤 → 자주 쓰는 간편결제(네페·토스)는 최하단<br/>
            3️⃣ 정보 확인·옵션 변경하다가 집중력 분산<br/>
            4️⃣ <b>"너무 번거롭다" → 페이지 이탈</b>
          </div>
        </Card>

        <Policy>
          P1-1 결제수단 순서변경 / P1-2 약관 일괄 동의 / P1-4 배송지 가독성 개선<br/>
          → 주문서 UI 마찰을 직접 해소하는 정책들이 모두 이 이탈을 타깃
        </Policy>
      </React.Fragment>
    );

    // ═══════════════════════════════════════════════
    // 3. 이탈 유저 추적
    // ═══════════════════════════════════════════════
    const Recovery = () => {
      const dist = [
        { label:"1개 이탈",    users:7616, pct:66.2 },
        { label:"2개 이탈",    users:2108, pct:18.3 },
        { label:"3~5개 이탈",  users:1360, pct:11.8 },
        { label:"6개 이상",    users:419,  pct:3.6 },
      ];
      return (
        <React.Fragment>
          <H1 sub="결제시도 이탈을 경험한 유저의 분포와 이후 행동">3. 이탈 유저 추적</H1>

          <Purpose>이탈한 프로젝트가 몇 명의 유저에 의해 발생했는지, 그 유저들이 이후 구매를 했는지 추적해 결제 마찰의 실질 영향 범위를 측정.</Purpose>

          <Card title="이탈 프로젝트 ↔ 유저 매핑">
            <div style={{ display:"flex", gap:14, flexWrap:"wrap" }}>
              {[
                { v:"20,674건", k:"이탈 프로젝트", c:"#dc2626" },
                { v:"11,503명", k:"이탈 유저", c:"#c2410c" },
                { v:"1.8개", k:"유저당 평균 이탈", c:"#1d4ed8" },
              ].map((x,i) => (
                <div key={i} style={{ flex:1, minWidth:180, padding:14, background:"#fff", border:"1px solid #e2e8f0", borderRadius:8, textAlign:"center" }}>
                  <div style={{ fontSize:24, fontWeight:800, color:x.c }}>{x.v}</div>
                  <div style={{ fontSize:12, color:"#64748b" }}>{x.k}</div>
                </div>
              ))}
            </div>
          </Card>

          <Card title="유저별 이탈 프로젝트 수 분포">
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={dist}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                <XAxis dataKey="label" tick={{ fontSize:12 }}/>
                <YAxis tick={{ fontSize:11 }}/>
                <Tooltip contentStyle={{ fontSize:12 }} formatter={(v,n)=>n==='users'?v.toLocaleString()+'명':v}/>
                <Bar dataKey="users" radius={[3,3,0,0]}>
